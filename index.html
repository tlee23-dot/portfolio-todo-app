<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="UTF-8"> 
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Todo App</title>
    <!-- Link to CSS styling -->
    <link rel="stylesheet" href="style.css"> 
</head>
<body> 
    <div class="todo-container"> 
        <h1>Task Tracker</h1>
        
        <!-- Main Input Section -->
        <div class="todo-input-area"> 
            <input type="text" id="todo-input" placeholder="What needs to be done?"> 
            <button id="add-btn">Add Task</button>
        </div>

        <!-- Extra Action Buttons -->
        <div class="action-buttons">
            <button id="search-btn" class="alt-btn">Search Task</button>
            <button id="clear-btn" class="alt-btn delete-all">Clear All</button>
        </div>
       
        <!-- Container for JavaScript-generated tasks -->
        <ul id="todo-list">
            <!-- Tasks with timers will be injected here --> 
        </ul>
    </div>

    <script src="app.js"></script>
</body>
</html>
